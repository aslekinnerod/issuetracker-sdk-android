name: Publish to Maven Central

on:
  push:
    tags:
      # Match semver-like tags (0.4.0, 0.5.1, etc.). The Gradle
      # version in sdk/build.gradle.kts must be bumped to match
      # the tag before pushing.
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3

      - name: Verify gradle version matches tag
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME}"
          gradle_version=$(grep -E '^version = ' sdk/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$gradle_version" ]; then
            echo "::error::Tag '$tag' does not match Gradle version '$gradle_version' in sdk/build.gradle.kts"
            exit 1
          fi

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        # --no-configuration-cache is recommended by the Vanniktech
        # plugin docs — the publishing task graph isn't fully
        # config-cache safe yet (as of plugin 0.30.x).
        run: ./gradlew :sdk:publishAndReleaseToMavenCentral --no-configuration-cache
